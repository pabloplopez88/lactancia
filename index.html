<html lang="es">
<head>

<title>🤱 Lactancia</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap');
:root {
  --cream:#fdf6f0; --warm:#e8c4a0; --brown:#5c3d20; --mid:#a07850;
  --accent:#c4845a; --left-dark:#1a4a5e; --right-dark:#5e1a4a;
  --left-border:#8fbfd4; --right-border:#d48fb8;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--cream);font-family:'DM Sans',sans-serif;color:var(--brown);min-height:100vh;padding-bottom:48px}

/* HEADER */
header{background:linear-gradient(135deg,#e8c4a0 0%,#f5dfc5 60%,var(--cream) 100%);padding:18px 14px 12px;border-bottom:1px solid #e0c8b0;position:sticky;top:0;z-index:100}
header .inner{max-width:480px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
header .title-area small{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--mid);display:block;margin-bottom:1px}
header h1{font-family:'Lora',serif;font-size:22px;font-weight:400;color:var(--brown)}
.tabs{display:flex;gap:5px}
.tab{padding:6px 13px;border-radius:20px;border:none;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;background:transparent;color:var(--mid);transition:all .2s}
.tab.active{background:var(--accent);color:#fff}

.main{max-width:480px;margin:0 auto;padding:16px 14px}
.view{display:none}.view.visible{display:block}

/* SUBTABS (historial) */
.subtabs{display:flex;gap:6px;margin-bottom:16px}
.subtab{flex:1;padding:9px;border-radius:12px;border:1.5px solid #e0c8b0;background:transparent;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;color:var(--mid);transition:all .2s;text-align:center}
.subtab.active{background:var(--mid);color:#fff;border-color:var(--mid)}
.subview{display:none}.subview.visible{display:block}

/* START BUTTONS */
.start-hint{text-align:center;font-size:12px;color:var(--mid);margin-bottom:10px;min-height:18px}
.start-hint strong{color:var(--accent)}
.btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.btn-side{padding:20px 10px;border-radius:18px;border:2px solid;font-family:'DM Sans',sans-serif;cursor:pointer;text-align:center;transition:transform .1s;line-height:1.4}
.btn-side:active{transform:scale(.96)}
.btn-side.left{background:linear-gradient(135deg,#c8e4f0,#a8cee0);border-color:var(--left-border);color:var(--left-dark)}
.btn-side.right{background:linear-gradient(135deg,#f0c8e0,#e0a8cc);border-color:var(--right-border);color:var(--right-dark)}
.btn-side .emoji{font-size:26px;display:block;margin-bottom:4px}
.btn-side .label{font-size:14px;font-weight:600;display:block}
.btn-side .sub{font-size:11px;opacity:.7;margin-top:2px;display:block}

/* ACTIVE */
#active-card{border-radius:18px;padding:16px;margin-bottom:14px;display:none;box-shadow:0 4px 20px rgba(0,0,0,.10)}
#active-card.left{background:linear-gradient(135deg,#d4eaf2,#b8d8e8);border:2px solid var(--left-border)}
#active-card.right{background:linear-gradient(135deg,#f0d4e8,#e8b8d0);border:2px solid var(--right-border)}
#active-card .row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
#active-card .badge{font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:3px}
#active-card.left .badge{color:#4a7a94}#active-card.right .badge{color:#944a7a}
#active-card .side-label{font-size:18px;font-family:'Lora',serif}
#active-card .start-time{font-size:12px;color:#6a5040;margin-top:2px}
#timer-display{font-size:40px;font-family:monospace;font-weight:bold;line-height:1;text-align:right}
#active-card.left #timer-display{color:var(--left-dark)}#active-card.right #timer-display{color:var(--right-dark)}
.timer-unit{font-size:10px;color:#8a7060;text-align:right;margin-top:2px}
.btn-stop{width:100%;padding:12px;border-radius:12px;border:none;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;color:#fff;cursor:pointer}
#active-card.left .btn-stop{background:#2a6a84}#active-card.right .btn-stop{background:#842a6a}

/* SUMMARY */
.summary-card{background:#fff;border-radius:16px;padding:14px;margin-bottom:14px;border:1px solid #ead8c8;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.section-label{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--mid);margin-bottom:10px}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.stat{text-align:center}.stat .val{font-size:24px;font-weight:600;color:var(--accent);font-family:'Lora',serif}.stat .key{font-size:10px;color:var(--mid);margin-top:2px}

/* SESSION CARDS */
.sessions-list{display:flex;flex-direction:column;gap:4px}
.session-card{display:flex;align-items:center;padding:7px 10px;border-radius:9px;gap:8px}
.session-card.left{background:#e8f4f8;border-left:3px solid var(--left-border)}
.session-card.right{background:#f8e8f4;border-left:3px solid var(--right-border)}
.session-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.session-card.left .session-dot{background:var(--left-border)}
.session-card.right .session-dot{background:var(--right-border)}
.session-info{flex:1;min-width:0;display:flex;align-items:center;gap:6px}
.session-info .name{font-size:12px;font-weight:600;white-space:nowrap}
.session-card.left .session-info .name{color:var(--left-dark)}.session-card.right .session-info .name{color:var(--right-dark)}
.session-info .times{font-size:11px;color:#7a6050}
.session-dur{flex-shrink:0;font-size:12px;font-family:monospace;font-weight:bold;color:#8a7060}
.card-actions{display:flex;gap:2px;flex-shrink:0}
.btn-icon{background:none;border:none;cursor:pointer;font-size:13px;padding:3px 4px;border-radius:5px;line-height:1;color:#b09070}
.btn-icon:active{background:rgba(0,0,0,.07)}

/* DAY GROUP */
.day-group{margin-bottom:18px}
.day-label{font-size:11px;font-weight:600;text-transform:capitalize;letter-spacing:.5px;color:var(--mid);padding:4px 2px 8px;border-bottom:1px solid #e8d8c8;margin-bottom:8px}

/* MANUAL BTN */
.manual-btn{width:100%;padding:10px;border-radius:12px;border:1.5px dashed var(--accent);background:transparent;color:var(--accent);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;margin-bottom:14px}
.manual-btn:active{background:#fde8d8}
.empty{text-align:center;padding:24px;color:#b09070;background:#fff8f2;border-radius:12px;border:1px dashed #e0c8b0;font-size:14px}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--cream);border-radius:24px 24px 0 0;padding:24px 16px 38px;width:100%;max-width:480px}
.modal h2{font-family:'Lora',serif;font-size:18px;font-weight:400;margin-bottom:16px;color:var(--brown)}
.field{margin-bottom:13px}
.field label{display:block;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--mid);margin-bottom:4px}
.field input,.field select{width:100%;padding:10px 12px;border-radius:10px;border:1.5px solid #e0c8b0;background:#fff;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--brown);outline:none}
.field input:focus,.field select:focus{border-color:var(--accent)}
.modal-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.btn-cancel{padding:11px;border-radius:12px;border:1.5px solid #e0c8b0;background:transparent;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--mid);cursor:pointer}
.btn-save{padding:11px;border-radius:12px;border:none;background:var(--accent);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;color:#fff;cursor:pointer}

/* CHART */
.chart-day-block{margin-bottom:28px}
.chart-day-label{font-size:11px;font-weight:600;text-transform:capitalize;letter-spacing:.5px;color:var(--mid);margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid #e8d8c8}
.chart-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.chart-wrap{position:relative;padding-left:36px;padding-bottom:22px}
svg.chart{display:block;overflow:visible}
.chart-legend{display:flex;gap:16px;margin-bottom:10px;font-size:11px;color:var(--mid);align-items:center}
.legend-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
#proxima-banner{
  background:#fff8f2;border:1px solid #e0c8b0;border-radius:12px;
  padding:10px 14px;margin-bottom:14px;
  display:none;align-items:center;justify-content:space-between;gap:8px;
}
#proxima-banner .pb-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--mid)}
#proxima-banner .pb-time{font-size:20px;font-family:'Lora',serif;color:var(--accent);font-weight:600}
#proxima-banner .pb-sub{font-size:10px;color:var(--mid);margin-top:1px}
#update-banner{
  display:none;position:fixed;bottom:0;left:0;right:0;z-index:300;
  background:var(--brown);color:#fff;
  padding:14px 16px;display:none;
  align-items:center;justify-content:space-between;
  font-size:14px;gap:12px;
}
#update-banner button{
  padding:8px 16px;border-radius:20px;border:none;
  background:var(--accent);color:#fff;font-family:'DM Sans',sans-serif;
  font-size:13px;cursor:pointer;white-space:nowrap;flex-shrink:0;
}
</style>
</head>
<body>

<header>
  <div class="inner">
    <div class="title-area">
      <small>registro de</small>
      <h1>🤱 Lactancia</h1>
    </div>
    <div class="tabs">
      <button class="tab active" id="tab-hoy" onclick="showView('hoy')">Hoy</button>
      <button class="tab" id="tab-historial" onclick="showView('historial')">Historial</button>
    </div>
  </div>
</header>

<div class="main">

  <!-- HOY -->
  <div id="view-hoy" class="view visible">
    <div id="active-card">
      <div class="row">
        <div>
          <div class="badge">En curso</div>
          <div class="side-label" id="active-label"></div>
          <div class="start-time" id="active-start"></div>
        </div>
        <div>
          <div id="timer-display">00:00</div>
          <div class="timer-unit">min:seg</div>
        </div>
      </div>
      <button class="btn-stop" onclick="stopSession()">⏹ Terminar toma</button>
    </div>

    <div id="start-area">
      <div class="start-hint" id="hint-text"></div>
      <div class="btn-grid">
        <button class="btn-side left" onclick="startSession('izquierda')">
          <span class="emoji">⬅️</span>
          <span class="label">Teta izquierda</span>
          <span class="sub">Iniciar toma</span>
        </button>
        <button class="btn-side right" onclick="startSession('derecha')">
          <span class="emoji">➡️</span>
          <span class="label">Teta derecha</span>
          <span class="sub">Iniciar toma</span>
        </button>
      </div>
    </div>

    <button class="manual-btn" onclick="openModal()">✏️ Cargar toma a mano</button>

    <div id="proxima-banner">
      <div>
        <div class="pb-label">Próxima toma antes de</div>
        <div class="pb-time" id="pb-time">--:--</div>
      </div>
      <div style="font-size:24px">🕐</div>
    </div>

    <div class="summary-card" id="ayer-card" style="display:none">
      <div class="section-label">Resumen de ayer</div>
      <div class="stats">
        <div class="stat"><div class="val" id="stat-ayer-tomas">0</div><div class="key">Tomas</div></div>
        <div class="stat"><div class="val" id="stat-ayer-min">0</div><div class="key">Min/toma</div></div>
        <div class="stat"><div class="val" id="stat-ayer-sides">0/0</div><div class="key">Izq/Der</div></div>
      </div>
    </div>

    <div class="section-label">Tomas de hoy</div>
    <div id="today-list" class="sessions-list"></div>
  </div>

  <!-- HISTORIAL -->
  <div id="view-historial" class="view">
    <div class="subtabs">
      <button class="subtab active" id="subtab-tabla" onclick="showSubview('tabla')">📋 Tabla</button>
      <button class="subtab" id="subtab-grafico" onclick="showSubview('grafico')">📊 Gráfico</button>
    </div>

    <div id="subview-tabla" class="subview visible">
      <div id="history-table"></div>
    </div>

    <div id="subview-grafico" class="subview">
      <div class="chart-legend">
        <div class="legend-dot" style="background:#8fbfd4"></div><span>Teta izquierda</span>
        <div class="legend-dot" style="background:#d48fb8"></div><span>Teta derecha</span>
      </div>
      <div id="history-chart"></div>
    </div>
  </div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModalOutside(event)">
  <div class="modal">
    <h2 id="modal-title">✏️ Cargar toma</h2>
    <div class="field"><label>Fecha</label><input type="date" id="m-date"></div>
    <div class="field"><label>Hora de inicio</label><input type="time" id="m-start"></div>
    <div class="field"><label>Hora de fin</label><input type="time" id="m-end"></div>
    <div class="field">
      <label>Teta</label>
      <select id="m-side">
        <option value="izquierda">⬅️ Izquierda</option>
        <option value="derecha">➡️ Derecha</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveModal()">Guardar</button>
    </div>
  </div>
</div>

<div id="update-banner">
  <span>🆕 Hay una versión nueva</span>
  <button onclick="applyUpdate()">Actualizar</button>
</div>

<script>
const STORAGE_KEY = 'lactancia_v2';
let editingId = null;

// ── utils ─────────────────────────────────────────────────────────
function pad(n){ return String(n).padStart(2,'0'); }
function localDateStr(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function todayStr(){ return localDateStr(new Date()); }
function fmtTime(iso){ const d=new Date(iso); return `${pad(d.getHours())}:${pad(d.getMinutes())}`; }
function fmtDate(str){
  const [y,m,d]=str.split('-');
  return new Date(Number(y),Number(m)-1,Number(d))
    .toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'});
}
function durStr(sec){ return `${pad(Math.floor(sec/60))}:${pad(sec%60)}`; }
function totalMin(list){ return Math.round(list.reduce((a,s)=>a+(s.duration||0),0)/60); }

// ── storage ───────────────────────────────────────────────────────
function load(){ try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'); }catch{ return []; } }
function save(s){ localStorage.setItem(STORAGE_KEY,JSON.stringify(s)); }

// ── preload ───────────────────────────────────────────────────────
(function(){
  let s=load();
  if(s.find(x=>x.id==='pre-1')) return;
  function li(date,time){ return new Date(`${date}T${time}:00`).toISOString(); }
  save([
    {id:'pre-1',side:'izquierda',date:'2026-06-05',startTime:li('2026-06-05','18:00'),endTime:li('2026-06-05','18:20'),duration:1200},
    {id:'pre-2',side:'derecha',  date:'2026-06-05',startTime:li('2026-06-05','18:20'),endTime:li('2026-06-05','18:35'),duration:900},
    {id:'pre-3',side:'derecha',  date:'2026-06-05',startTime:li('2026-06-05','20:55'),endTime:li('2026-06-05','21:20'),duration:1500},
    ...s
  ]);
})();

// ── active session ────────────────────────────────────────────────
let activeSession=null, timerInterval=null;

function elapsedSec(){
  if(!activeSession) return 0;
  return Math.floor((Date.now() - new Date(activeSession.startTime).getTime()) / 1000);
}

function startSession(side){
  if(activeSession) return;
  activeSession={side, startTime:new Date().toISOString()};
  // Persist across page reloads / background
  localStorage.setItem('lactancia_active', JSON.stringify(activeSession));
  renderActive();
  timerInterval=setInterval(tickTimer, 500);
}

function tickTimer(){
  const el=document.getElementById('timer-display');
  if(el) el.textContent=durStr(elapsedSec());
}

function stopSession(){
  if(!activeSession) return;
  clearInterval(timerInterval);
  const endTime=new Date().toISOString();
  const duration=elapsedSec();
  const s={
    id:Date.now().toString(), side:activeSession.side,
    date:localDateStr(new Date(activeSession.startTime)),
    startTime:activeSession.startTime, endTime, duration
  };
  const all=load(); all.unshift(s); save(all);
  activeSession=null;
  localStorage.removeItem('lactancia_active');
  renderActive(); renderToday();
}

function renderActive(){
  const card=document.getElementById('active-card');
  const startArea=document.getElementById('start-area');
  if(activeSession){
    card.className=activeSession.side==='izquierda'?'left':'right';
    card.id='active-card'; card.style.display='block';
    document.getElementById('active-label').textContent=
      activeSession.side==='izquierda'?'⬅️ Teta izquierda':'➡️ Teta derecha';
    document.getElementById('active-start').textContent='Inicio: '+fmtTime(activeSession.startTime);
    document.getElementById('timer-display').textContent=durStr(elapsedSec());
    startArea.style.display='none';
    clearInterval(timerInterval);
    timerInterval=setInterval(tickTimer, 500);
  } else {
    card.style.display='none'; startArea.style.display='block'; renderHint();
  }
}

function renderHint(){
  const s=load(); const hint=document.getElementById('hint-text');
  if(!s.length){ hint.textContent=''; return; }
  const last=s[0].side;
  hint.innerHTML=`Última: ${last==='izquierda'?'⬅️':'➡️'} ${last} · <strong>Próxima: ${last==='izquierda'?'➡️ derecha':'⬅️ izquierda'}</strong>`;
}

// ── today ─────────────────────────────────────────────────────────
function yesterdayStr(){
  const d=new Date(); d.setDate(d.getDate()-1); return localDateStr(d);
}

function renderToday(){
  const all=load(), today=todayStr(), ayer=yesterdayStr();

  // Ayer
  const ay=all.filter(s=>s.date===ayer);
  const ayerCard=document.getElementById('ayer-card');
  if(ay.length){
    ayerCard.style.display='';
    document.getElementById('stat-ayer-tomas').textContent=ay.length;
    document.getElementById('stat-ayer-min').textContent=ay.length?Math.round(totalMin(ay)/ay.length):0;
    document.getElementById('stat-ayer-sides').textContent=
      `${ay.filter(s=>s.side==='izquierda').length}/${ay.filter(s=>s.side==='derecha').length}`;
  } else {
    ayerCard.style.display='none';
  }

  // Hoy
  const ts=all.filter(s=>s.date===today).sort((a,b)=>new Date(b.startTime)-new Date(a.startTime));

  const list=document.getElementById('today-list');
  list.innerHTML=ts.length?ts.map(sessionHTML).join(''):'<div class="empty">Todavía no hay tomas registradas hoy 🌙</div>';
  renderProxima();
}

function renderProxima(){
  const all=load();
  const banner=document.getElementById('proxima-banner');
  if(!all.length){ banner.style.display='none'; return; }
  const last=all.sort((a,b)=>new Date(b.endTime)-new Date(a.endTime))[0];
  const proxima=new Date(new Date(last.endTime).getTime()+3*60*60*1000);
  document.getElementById('pb-time').textContent=fmtTime(proxima.toISOString());
  banner.style.display='flex';
}

function sessionHTML(s){
  const cls=s.side==='izquierda'?'left':'right';
  const label=s.side==='izquierda'?'Izq':'Der';
  return `<div class="session-card ${cls}" id="sc-${s.id}">
    <div class="session-dot"></div>
    <div class="session-info">
      <span class="name">${label}</span>
      <span class="times">${fmtTime(s.startTime)}–${fmtTime(s.endTime)}</span>
    </div>
    <div class="session-dur">${durStr(s.duration)}</div>
    <div class="card-actions">
      <button class="btn-icon" onclick="editSession('${s.id}')">✏️</button>
      <button class="btn-icon" onclick="deleteSession('${s.id}')">✕</button>
    </div>
  </div>`;
}

// ── delete / edit ─────────────────────────────────────────────────
function deleteSession(id){
  if(!confirm('¿Eliminar esta toma?')) return;
  save(load().filter(s=>String(s.id)!==String(id)));
  renderToday(); renderHistorial();
}

function editSession(id){
  const s=load().find(s=>String(s.id)===String(id));
  if(!s) return;
  editingId=id;
  document.getElementById('modal-title').textContent='✏️ Editar toma';
  document.getElementById('m-date').value=s.date;
  document.getElementById('m-start').value=fmtTime(s.startTime);
  document.getElementById('m-end').value=fmtTime(s.endTime);
  document.getElementById('m-side').value=s.side;
  document.getElementById('modal').classList.add('open');
}

// ── modal ─────────────────────────────────────────────────────────
function openModal(){
  editingId=null;
  document.getElementById('modal-title').textContent='✏️ Cargar toma';
  document.getElementById('m-date').value=todayStr();
  document.getElementById('m-start').value='';
  document.getElementById('m-end').value='';
  document.getElementById('m-side').value='izquierda';
  document.getElementById('modal').classList.add('open');
}
function closeModal(){ document.getElementById('modal').classList.remove('open'); editingId=null; }
function closeModalOutside(e){ if(e.target===document.getElementById('modal')) closeModal(); }

function saveModal(){
  const date=document.getElementById('m-date').value;
  const start=document.getElementById('m-start').value;
  const end=document.getElementById('m-end').value;
  const side=document.getElementById('m-side').value;
  if(!date||!start||!end){ alert('Completá todos los campos'); return; }
  const startISO=new Date(`${date}T${start}:00`).toISOString();
  const endISO=new Date(`${date}T${end}:00`).toISOString();
  const duration=Math.max(0,Math.round((new Date(endISO)-new Date(startISO))/1000));
  let all=load();
  if(editingId){
    all=all.map(s=>String(s.id)===String(editingId)?{...s,side,date,startTime:startISO,endTime:endISO,duration}:s);
  } else {
    all.unshift({id:Date.now().toString(),side,date,startTime:startISO,endTime:endISO,duration});
  }
  save(all); closeModal(); renderToday(); renderHistorial();
}

// ── historial ─────────────────────────────────────────────────────
function byDateGroups(){
  const all=load();
  const map={};
  all.forEach(s=>{ if(!map[s.date]) map[s.date]=[]; map[s.date].push(s); });
  const days=Object.keys(map).sort((a,b)=>b.localeCompare(a));
  return {map,days};
}

function renderHistorial(){
  renderTable();
  renderChart();
}

// TABLA
function renderTable(){
  const {map,days}=byDateGroups();
  const container=document.getElementById('history-table');
  if(!days.length){ container.innerHTML='<div class="empty">No hay registros todavía</div>'; return; }
  container.innerHTML=days.map(day=>{
    const list=map[day].sort((a,b)=>new Date(a.startTime)-new Date(b.startTime));
    return `<div class="day-group">
      <div class="day-label">${fmtDate(day)} · ${list.length} tomas · ${totalMin(list)} min</div>
      <div class="sessions-list">${list.map(sessionHTML).join('')}</div>
    </div>`;
  }).join('');
}

// GRÁFICO
function renderChart(){
  const all=load();
  const container=document.getElementById('history-chart');
  if(!all.length){ container.innerHTML='<div class="empty">No hay registros todavía</div>'; return; }
  container.innerHTML=buildUnifiedChart(all);
}

function buildUnifiedChart(sessions){
  const VW     = 340;
  const YPAD_T = 8;
  const YPAD_B = 28;
  const XPAD_L = 32;
  const XPAD_R = 6;
  const PLOT_W = VW - XPAD_L - XPAD_R;
  const PLOT_H = 150;
  const H      = PLOT_H + YPAD_T + YPAD_B;
  const AXIS_Y = YPAD_T + PLOT_H;

  // X axis: absolute epoch time across all sessions
  const sorted = [...sessions].sort((a,b)=>new Date(a.startTime)-new Date(b.startTime));
  const tStart = new Date(sorted[0].startTime).getTime();
  const tEnd   = new Date(sorted[sorted.length-1].endTime).getTime();
  const tSpan  = tEnd - tStart;

  // Y axis: max duration in minutes
  const maxDurMin = Math.max(...sessions.map(s=>s.duration/60), 5);
  const yMax = Math.ceil(maxDurMin/5)*5;

  function toX(iso){
    return XPAD_L + ((new Date(iso).getTime()-tStart)/tSpan)*PLOT_W;
  }
  function toBarH(durSec){
    return Math.max(3,(durSec/60/yMax)*PLOT_H);
  }

  // Y grid
  let yLines='', yLabels='';
  const yStep=yMax<=10?2:yMax<=20?5:10;
  for(let y=0;y<=yMax;y+=yStep){
    const yPx=YPAD_T+PLOT_H-(y/yMax)*PLOT_H;
    yLines+=`<line x1="${XPAD_L}" y1="${yPx.toFixed(1)}" x2="${(XPAD_L+PLOT_W).toFixed(1)}" y2="${yPx.toFixed(1)}" stroke="${y===0?'#c8b090':'#ecddc8'}" stroke-width="${y===0?1.2:0.6}" stroke-dasharray="${y===0?'none':'3,3'}"/>`;
    yLabels+=`<text x="${(XPAD_L-4).toFixed(1)}" y="${(yPx+3.5).toFixed(1)}" text-anchor="end" font-size="8" fill="#a07850" font-family="DM Sans,sans-serif">${y}</text>`;
  }
  const yAxisLabel=`<text x="7" y="${(YPAD_T+PLOT_H/2).toFixed(1)}" text-anchor="middle" font-size="8" fill="#a07850" font-family="DM Sans,sans-serif" transform="rotate(-90,7,${(YPAD_T+PLOT_H/2).toFixed(1)})">min</text>`;

  // Midnight lines — find all midnights between tStart and tEnd
  let midnights='';
  const d0=new Date(tStart); d0.setHours(0,0,0,0); d0.setDate(d0.getDate()+1);
  const dCur=new Date(d0);
  while(dCur.getTime()<tEnd){
    const x=toX(dCur.toISOString());
    if(x>XPAD_L && x<XPAD_L+PLOT_W){
      const dateLabel=`${pad(dCur.getDate())}/${pad(dCur.getMonth()+1)}`;
      midnights+=`<line x1="${x.toFixed(1)}" y1="${YPAD_T}" x2="${x.toFixed(1)}" y2="${AXIS_Y}" stroke="#c8b090" stroke-width="1" stroke-dasharray="4,3"/>
      <text x="${(x+2).toFixed(1)}" y="${(YPAD_T+8).toFixed(1)}" font-size="7.5" fill="#b09070" font-family="DM Sans,sans-serif">${dateLabel}</text>`;
    }
    dCur.setDate(dCur.getDate()+1);
  }

  // X axis ticks — one per day at start of day, or sensible interval
  const totalDays=Math.ceil((tEnd-tStart)/(86400000));
  let xTicks='';
  if(totalDays<=1){
    // tick every 2h
    const d=new Date(tStart); d.setMinutes(0,0,0);
    while(d.getTime()<=tEnd){
      const x=toX(d.toISOString());
      if(x>=XPAD_L-1&&x<=XPAD_L+PLOT_W+1){
        xTicks+=`<line x1="${x.toFixed(1)}" y1="${AXIS_Y}" x2="${x.toFixed(1)}" y2="${(AXIS_Y+4).toFixed(1)}" stroke="#c8b090" stroke-width="1"/>
        <text x="${x.toFixed(1)}" y="${(AXIS_Y+13).toFixed(1)}" text-anchor="middle" font-size="8" fill="#a07850" font-family="DM Sans,sans-serif">${pad(d.getHours())}:00</text>`;
      }
      d.setHours(d.getHours()+2);
    }
  } else {
    // tick each day at noon
    const d=new Date(tStart); d.setHours(12,0,0,0);
    while(d.getTime()<=tEnd){
      const x=toX(d.toISOString());
      if(x>=XPAD_L&&x<=XPAD_L+PLOT_W){
        xTicks+=`<text x="${x.toFixed(1)}" y="${(AXIS_Y+13).toFixed(1)}" text-anchor="middle" font-size="8" fill="#a07850" font-family="DM Sans,sans-serif">${pad(d.getDate())}/${pad(d.getMonth()+1)}</text>`;
      }
      d.setDate(d.getDate()+1);
    }
  }

  // Bars
  let bars=sorted.map(s=>{
    const x1=toX(s.startTime);
    const bh=toBarH(s.duration);
    const by=YPAD_T+PLOT_H-bh;
    const bw=Math.max(5,toX(s.endTime)-x1);
    const fill=s.side==='izquierda'?'#8fbfd4':'#d48fb8';
    const stroke=s.side==='izquierda'?'#5a9ab8':'#b86898';
    const tc=s.side==='izquierda'?'#1a4a5e':'#5e1a4a';
    const durM=Math.round(s.duration/60);
    const labelY=bh>18?by+bh-4:by-3;
    return `<rect x="${x1.toFixed(1)}" y="${by.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" rx="3" fill="${fill}" stroke="${stroke}" stroke-width="1"/>
    <text x="${(x1+bw/2).toFixed(1)}" y="${labelY.toFixed(1)}" text-anchor="middle" font-size="7.5" fill="${tc}" font-family="DM Sans,sans-serif">${durM}m</text>`;
  }).join('');

  const baseline=`<line x1="${XPAD_L}" y1="${AXIS_Y}" x2="${(XPAD_L+PLOT_W).toFixed(1)}" y2="${AXIS_Y}" stroke="#c8b090" stroke-width="1.2"/>`;

  return `<svg class="chart" width="100%" viewBox="0 0 ${VW} ${H}" style="display:block">
    ${yLines}${yLabels}${yAxisLabel}${midnights}${bars}${baseline}${xTicks}
  </svg>`;
}


// ── views ─────────────────────────────────────────────────────────
function showView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('visible'));
  document.getElementById('view-'+name).classList.add('visible');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='historial') renderHistorial();
}

function showSubview(name){
  document.querySelectorAll('.subview').forEach(v=>v.classList.remove('visible'));
  document.getElementById('subview-'+name).classList.add('visible');
  document.querySelectorAll('.subtab').forEach(t=>t.classList.remove('active'));
  document.getElementById('subtab-'+name).classList.add('active');
}

// ── service worker ────────────────────────────────────────────────
let newWorker = null;

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(reg => {
    reg.addEventListener('updatefound', () => {
      newWorker = reg.installing;
      newWorker.addEventListener('statechange', () => {
        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
          // Nueva versión lista — mostrar banner
          document.getElementById('update-banner').style.display = 'flex';
        }
      });
    });
  });
}

function applyUpdate() {
  if (newWorker) newWorker.postMessage({ action: 'skipWaiting' });
  window.location.reload();
}
