<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>🤱 Lactancia</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap');
:root {
  --cream:#fdf6f0; --warm:#e8c4a0; --brown:#5c3d20; --mid:#a07850;
  --accent:#c4845a; --left-dark:#1a4a5e; --right-dark:#5e1a4a;
  --left-border:#8fbfd4; --right-border:#d48fb8;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--cream);font-family:'DM Sans',sans-serif;color:var(--brown);min-height:100vh;padding-bottom:48px}

/* HEADER */
header{background:linear-gradient(135deg,#e8c4a0 0%,#f5dfc5 60%,var(--cream) 100%);padding:18px 14px 12px;border-bottom:1px solid #e0c8b0;position:sticky;top:0;z-index:100}
header .inner{max-width:480px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
header .title-area small{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--mid);display:block;margin-bottom:1px}
header h1{font-family:'Lora',serif;font-size:22px;font-weight:400;color:var(--brown)}
.tabs{display:flex;gap:5px}
.tab{padding:6px 13px;border-radius:20px;border:none;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;background:transparent;color:var(--mid);transition:all .2s}
.tab.active{background:var(--accent);color:#fff}

.main{max-width:480px;margin:0 auto;position:relative}
.carousel-outer{overflow-x:clip;overflow-y:visible;width:100%}.carousel-track{display:flex;transition:transform 0.28s cubic-bezier(.25,.46,.45,.94);will-change:transform}
.carousel-slide{min-width:100vw;max-width:100vw;padding:18px 14px;box-sizing:border-box;flex-shrink:0}
.view{}.view.visible{}

/* SUBTABS (historial) */
.subtabs{display:flex;gap:6px;margin-bottom:16px}
.subtab{flex:1;padding:9px;border-radius:12px;border:1.5px solid #e0c8b0;background:transparent;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;color:var(--mid);transition:all .2s;text-align:center}
.subtab.active{background:var(--mid);color:#fff;border-color:var(--mid)}
.subview{display:none}.subview.visible{display:block}

/* START BUTTONS */
.start-hint{text-align:center;font-size:12px;color:var(--mid);margin-bottom:10px;min-height:18px}
.start-hint strong{color:var(--accent)}
.btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.btn-side{padding:42px 10px;border-radius:50% 50% 50% 50% / 55% 55% 45% 45%;border:2px solid;font-family:'DM Sans',sans-serif;cursor:pointer;text-align:center;transition:transform .1s;line-height:1.4}
.btn-side:active{transform:scale(.96)}
.btn-side.left{background:linear-gradient(135deg,#fff0b0,#ffe060);border-color:#c8960a;color:#7a5500}
.btn-side.right{background:linear-gradient(135deg,#b8f0d8,#80e8b8);border-color:#1ab87a;color:#005a38}
.btn-side .emoji{font-size:26px;display:block;margin-bottom:4px}
.btn-side .label{font-size:14px;font-weight:600;display:block}
.btn-side .sub{font-size:11px;opacity:.7;margin-top:2px;display:block}

/* ACTIVE */
#active-card{border-radius:18px;padding:16px;margin-bottom:14px;display:none;box-shadow:0 4px 20px rgba(0,0,0,.10)}
#active-card.left{background:linear-gradient(135deg,#fff4b0,#ffe878);border:2px solid #c8960a}
#active-card.right{background:linear-gradient(135deg,#b8f4dc,#78eabc);border:2px solid #1ab87a}
#active-card .row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
#active-card .badge{font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:3px}
#active-card.left .badge{color:#7a5500}#active-card.right .badge{color:#005a38}
#active-card .side-label{font-size:18px;font-family:'Lora',serif}
#active-card .start-time{font-size:12px;color:#6a5040;margin-top:2px}
#timer-display{font-size:40px;font-family:monospace;font-weight:bold;line-height:1;text-align:right}
#active-card.left #timer-display{color:#7a5500}#active-card.right #timer-display{color:#005a38}
.timer-unit{font-size:10px;color:#8a7060;text-align:right;margin-top:2px}
.btn-stop{width:100%;padding:12px;border-radius:12px;border:none;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;color:#fff;cursor:pointer}
#active-card.left .btn-stop{background:#c8960a}#active-card.right .btn-stop{background:#1ab87a}

/* SUMMARY */
.summary-card{background:#fff;border-radius:16px;padding:14px;margin-bottom:14px;border:1px solid #ead8c8;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.section-label{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--mid);margin-bottom:10px}
.chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px;flex-wrap:wrap}
.chart-header .chart-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--mid)}
.chart-header .chart-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.btn-fullscreen{padding:5px 12px;border-radius:20px;border:1.5px solid #e0c8b0;background:transparent;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--mid);cursor:pointer;white-space:nowrap}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.stat{text-align:center}.stat .val{font-size:24px;font-weight:600;color:var(--accent);font-family:'Lora',serif}.stat .key{font-size:10px;color:var(--mid);margin-top:2px}

/* SESSION CARDS */
.sessions-list{display:flex;flex-direction:column;gap:4px}
.session-card{display:flex;align-items:center;padding:7px 10px;border-radius:9px;gap:8px}
.session-card.left{background:#fdf6d8;border-left:3px solid #e8c020}
.session-card.right{background:#d8f5ec;border-left:3px solid #1ab87a}
.session-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.session-card.left .session-dot{background:#c8960a}
.session-card.right .session-dot{background:#1ab87a}
.session-info{flex:1;min-width:0;display:flex;align-items:center;gap:6px}
.session-info .name{font-size:12px;font-weight:600;white-space:nowrap}
.session-card.left .session-info .name{color:#7a5500}.session-card.right .session-info .name{color:#005a38}
.session-info .times{font-size:11px;color:#7a6050}
.session-dur{flex-shrink:0;font-size:12px;font-family:monospace;font-weight:bold;color:#8a7060}
.card-actions{display:flex;gap:2px;flex-shrink:0}
.btn-icon{background:none;border:none;cursor:pointer;font-size:13px;padding:3px 4px;border-radius:5px;line-height:1;color:#b09070}
.btn-icon:active{background:rgba(0,0,0,.07)}

/* DAY GROUP */
.day-group{margin-bottom:18px}
.day-label{font-size:11px;font-weight:600;letter-spacing:.5px;color:var(--mid);padding:4px 2px 8px;border-bottom:1px solid #e8d8c8;margin-bottom:8px}

/* MANUAL BTN */
.manual-btn{width:100%;padding:10px;border-radius:12px;border:1.5px dashed var(--accent);background:transparent;color:var(--accent);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;margin-bottom:14px}
.manual-btn:active{background:#fde8d8}
.empty{text-align:center;padding:24px;color:#b09070;background:#fff8f2;border-radius:12px;border:1px dashed #e0c8b0;font-size:14px}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--cream);border-radius:24px 24px 0 0;padding:24px 16px 38px;width:100%;max-width:480px}
.modal h2{font-family:'Lora',serif;font-size:18px;font-weight:400;margin-bottom:16px;color:var(--brown)}
.field{margin-bottom:13px}
.field label{display:block;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--mid);margin-bottom:4px}
.field input,.field select{width:100%;padding:10px 12px;border-radius:10px;border:1.5px solid #e0c8b0;background:#fff;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--brown);outline:none}
.field input:focus,.field select:focus{border-color:var(--accent)}
.modal-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.btn-cancel{padding:11px;border-radius:12px;border:1.5px solid #e0c8b0;background:transparent;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--mid);cursor:pointer}
.btn-save{padding:11px;border-radius:12px;border:none;background:var(--accent);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;color:#fff;cursor:pointer}

/* CHART */
.chart-day-block{margin-bottom:28px}
.chart-day-label{font-size:11px;font-weight:600;text-transform:capitalize;letter-spacing:.5px;color:var(--mid);margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid #e8d8c8}
.chart-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.chart-wrap{position:relative;padding-left:36px;padding-bottom:22px}
svg.chart{display:block;overflow:visible}
#history-chart-scroll{border-radius:8px}
#history-chart-scroll:active{cursor:grabbing}
/* fullscreen chart modal */
#chart-modal {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 300;
  background: #1a1c2e;
  overflow: hidden;
}
#chart-modal.open { display: block; }
#chart-modal-close {
  position: absolute;
  top: 10px;
  right: 10px;
  z-index: 301;
  width: 32px; height: 32px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,0.15);
  color: #fff;
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
#chart-modal-inner {
  position: absolute;
  /* Will be sized and rotated by JS */
}
#subview-grafico.landscape-mode .chart-close-btn {
  display: flex;
}
.chart-close-btn {
  display: none;
  align-items: center;
  justify-content: flex-end;
  margin-bottom: 8px;
}
.chart-close-btn button {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1.5px solid #e0c8b0;
  background: transparent;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  color: var(--mid);
  cursor: pointer;
}
#chart-fs-wrap {
  flex: 1;
  display: flex;
  align-items: center;
}
.chart-legend{display:flex;gap:16px;margin-bottom:10px;font-size:11px;color:var(--mid);align-items:center}
.legend-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.summary-row{display:flex;gap:10px;margin-bottom:0}
.summary-row .summary-card{flex:3;margin-bottom:0}
.summary-row .summary-card.mini{flex:1;min-width:0;border-color:#c4845a;box-shadow:0 0 0 1px #c4845a22,0 2px 8px rgba(196,132,90,0.12)}
#proxima-banner{
  background:#fff8f2;border:1px solid #e0c8b0;border-radius:12px;
  padding:10px 14px;margin-bottom:14px;
  display:none;align-items:center;justify-content:space-between;gap:8px;
}
#proxima-banner .pb-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--mid)}
#proxima-banner .pb-time{font-size:20px;font-family:'Lora',serif;color:var(--accent);font-weight:600}
#proxima-banner .pb-sub{font-size:10px;color:var(--mid);margin-top:1px}
#update-banner{
  display:none;position:fixed;bottom:0;left:0;right:0;z-index:300;
  background:var(--brown);color:#fff;
  padding:14px 16px;display:none;
  align-items:center;justify-content:space-between;
  font-size:14px;gap:12px;
}
#update-banner button{
  padding:8px 16px;border-radius:20px;border:none;
  background:var(--accent);color:#fff;font-family:'DM Sans',sans-serif;
  font-size:13px;cursor:pointer;white-space:nowrap;flex-shrink:0;
}
</style>
</head>
<body>

<header>
  <div class="inner">
    <div class="title-area">
      <small>registro de</small>
      <h1>🤱 Lactancia</h1>
    </div>
    <div class="tabs">
      <button class="tab active" id="tab-hoy" onclick="showView('hoy')">Hoy</button>
      <button class="tab" id="tab-historial" onclick="showView('historial')">Historial</button>
    </div>
  </div>
</header>

<div class="main" id="main-content">
  <div class="carousel-outer"><div class="carousel-track" id="carousel-track">

  <!-- HOY -->
  <div id="view-hoy" class="carousel-slide view visible">
    <div id="active-card">
      <div class="row">
        <div>
          <div class="badge">En curso</div>
          <div class="side-label" id="active-label"></div>
          <div class="start-time" id="active-start"></div>
        </div>
        <div>
          <div id="timer-display">00:00</div>
          <div class="timer-unit">min:seg</div>
        </div>
      </div>
      <button class="btn-stop" onclick="stopSession()">⏹ Terminar toma</button>
    </div>

    <div id="start-area">
      <div class="start-hint" id="hint-text"></div>
      <div class="btn-grid">
        <button class="btn-side right" onclick="startSession('derecha')">
          <span class="label">Teta derecha</span>
          <span class="sub">Iniciar toma</span>
        </button>
        <button class="btn-side left" onclick="startSession('izquierda')">
          <span class="label">Teta izquierda</span>
          <span class="sub">Iniciar toma</span>
        </button>
      </div>
    </div>

    <div id="proxima-banner">
      <div>
        <div class="pb-label">Próxima toma antes de</div>
        <div class="pb-time" id="pb-time">--:--</div>
      </div>
      <div style="font-size:24px">🕐</div>
    </div>

    <div class="summary-row" id="summary-row" style="display:none;margin-bottom:14px">
      <div class="summary-card" id="ayer-card">
        <div class="section-label">Ayer</div>
        <div class="stats" style="grid-template-columns:1fr 1fr 1fr 1fr">
          <div class="stat"><div class="val" id="stat-ayer-tomas">0</div><div class="key">tomas</div></div>
          <div class="stat"><div class="val" id="stat-ayer-total">0</div><div class="key">min</div></div>
          <div class="stat"><div class="val" id="stat-ayer-min">0</div><div class="key">min/toma</div></div>
          <div class="stat"><div class="val" id="stat-ayer-mph">0</div><div class="key">min/h</div></div>
        </div>
      </div>
      <div class="summary-card mini">
        <div class="section-label">Global</div>
        <div class="stats" style="grid-template-columns:1fr 1fr">
          <div class="stat"><div class="val" id="stat-global-avg" style="font-size:20px">0</div><div class="key">min/toma</div></div>
          <div class="stat"><div class="val" id="stat-global-mph" style="font-size:20px">0</div><div class="key">min/h</div></div>
        </div>
      </div>
    </div>

    <div style="margin-bottom:8px">
      <div class="section-label" style="margin-bottom:3px">Tomas de hoy</div>
      <div id="today-stats-line" style="font-size:11px;color:var(--mid)"></div>
    </div>
    <div id="today-list" class="sessions-list"></div>
  </div>

  <!-- HISTORIAL -->
  <div id="view-historial" class="carousel-slide view">
    <div class="subtabs">
      <button class="subtab active" id="subtab-tabla" onclick="showSubview('tabla')">📋 Tabla</button>
      <button class="subtab" id="subtab-grafico" onclick="showSubview('grafico')">📊 Gráficos</button>
    </div>

    <div id="subview-tabla" class="subview visible">
      <button class="manual-btn" onclick="openModal()">✏️ Cargar toma a mano</button>
      <button class="manual-btn" style="border-color:#a07850;color:#a07850" onclick="exportCSV()">⬇ Descargar CSV</button>
      <div id="history-table"></div>
    </div>

    <div id="subview-grafico" class="subview">
      <div class="chart-close-btn">
        <button onclick="exitFullChart()">✕ Cerrar</button>
      </div>
      <div class="chart-header">
        <span class="chart-title">Todos los registros</span>
        <div class="chart-controls">
          <button class="btn-fullscreen" onclick="enterFullChart()">⛶ Pantalla completa</button>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px 10px;margin-bottom:10px;align-items:center">
        <label style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--brown);cursor:pointer">
          <input type="checkbox" id="tog-izq" checked onchange="toggleLayer('izq')">
          <span style="width:8px;height:8px;border-radius:50%;background:#ffd84d;display:inline-block;flex-shrink:0"></span>Izquierda
        </label>
        <label style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--brown);cursor:pointer">
          <input type="checkbox" id="tog-der" checked onchange="toggleLayer('der')">
          <span style="width:8px;height:8px;border-radius:50%;background:#4de8a8;display:inline-block;flex-shrink:0"></span>Derecha
        </label>
        <label style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--brown);cursor:pointer;flex-wrap:nowrap">
          <input type="checkbox" id="tog-bins" checked onchange="toggleLayer('bins')">
          <span style="width:14px;height:2px;background:rgba(255,255,255,0.7);display:inline-block;vertical-align:middle;border-radius:1px;flex-shrink:0"></span>
          <span style="white-space:nowrap">Total/h</span>
          <select id="bin-size" onchange="renderChart()" style="font-size:11px;border:1px solid #e0c8b0;border-radius:8px;padding:2px 4px;background:#fff;color:var(--mid);font-family:'DM Sans',sans-serif;cursor:pointer;max-width:90px">
            <option value="0">sin suav.</option>
            <option value="1">σ=1h</option>
            <option value="2" selected>σ=2h</option>
            <option value="3">σ=3h</option>
            <option value="4">σ=4h</option>
            <option value="6">σ=6h</option>
          </select>
        </label>
        <label style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--brown);cursor:pointer">
          <input type="checkbox" id="tog-avg" checked onchange="toggleLayer('avg')">
          <span style="width:8px;height:8px;border-radius:50%;background:rgba(255,200,80,0.9);display:inline-block;flex-shrink:0"></span>Media
        </label>
      </div>
      <div id="chart-fs-wrap">
        <div id="history-chart-scroll" style="overflow-x:auto;-webkit-overflow-scrolling:touch;cursor:grab;max-width:100%;width:100%">
          <div id="history-chart"></div>
        </div>
      </div>

      <div style="margin-top:20px">
        <div class="chart-header">
          <span class="chart-title">Frecuencias características</span>
          <div class="chart-controls">
            <button class="btn-fullscreen" onclick="enterFullChartFFT()">⛶ Pantalla completa</button>
          </div>
        </div>
        <div id="history-chart-fft" style="width:100%"></div>
      </div>

      <div style="margin-top:20px">
        <div class="chart-header">
          <span class="chart-title">Día promedio</span>
          <div class="chart-controls">
            <button class="btn-fullscreen" onclick="enterFullChart2()">⛶ Pantalla completa</button>
          </div>
        </div>
        <div id="history-chart2" style="width:100%"></div>
      </div>
    </div>
  </div>

  </div></div><!-- end carousel-track/outer -->
</div>

<!-- FULLSCREEN CHART MODAL -->
<div id="chart-modal">
  <button id="chart-modal-close" onclick="exitFullChart()">✕</button>
  <div id="chart-modal-inner">
    <div id="chart-modal-content"></div>
  </div>
</div>

<!-- FULLSCREEN CHART2 MODAL -->
<div id="chart-modal2" style="display:none;position:fixed;inset:0;z-index:300;background:#1a1c2e;overflow:hidden">
  <button id="chart-modal-close2" onclick="exitFullChart2()" style="position:absolute;top:10px;right:10px;z-index:301;width:32px;height:32px;border-radius:50%;border:none;background:rgba(255,255,255,0.15);color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center">✕</button>
  <div id="chart-modal-inner2" style="position:absolute">
    <div id="chart-modal-content2"></div>
  </div>
</div>

<!-- FULLSCREEN FFT MODAL -->
<div id="chart-modal-fft" style="display:none;position:fixed;inset:0;z-index:300;background:#1a1c2e;overflow:hidden">
  <button onclick="exitFullChartFFT()" style="position:absolute;top:10px;right:10px;z-index:301;width:32px;height:32px;border-radius:50%;border:none;background:rgba(255,255,255,0.15);color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center">✕</button>
  <div id="chart-modal-inner-fft" style="position:absolute">
    <div id="chart-modal-content-fft"></div>
  </div>
</div>

<!-- MERGE MODAL -->
<div class="modal-overlay" id="merge-modal" onclick="closeMergeOutside(event)">
  <div class="modal">
    <h2>🔗 ¿Unir tomas?</h2>
    <p style="font-size:14px;color:var(--mid);margin-bottom:20px;line-height:1.5" id="merge-text"></p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="mergeAnswer(false)">No, nueva toma</button>
      <button class="btn-save" onclick="mergeAnswer(true)">Sí, unir</button>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModalOutside(event)">
  <div class="modal">
    <h2 id="modal-title">✏️ Cargar toma</h2>
    <div class="field"><label>Fecha</label><input type="date" id="m-date"></div>
    <div class="field"><label>Hora de inicio</label><input type="time" id="m-start"></div>
    <div class="field"><label>Hora de fin</label><input type="time" id="m-end"></div>
    <div class="field">
      <label>Teta</label>
      <select id="m-side">
        <option value="izquierda">⬅️ Izquierda</option>
        <option value="derecha">➡️ Derecha</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveModal()">Guardar</button>
    </div>
  </div>
</div>

<div id="update-banner">
  <span>🆕 Hay una versión nueva</span>
  <button onclick="applyUpdate()">Actualizar</button>
</div>

<script>
const STORAGE_KEY = 'lactancia_v2';
let editingId = null;

// ── utils ─────────────────────────────────────────────────────────
function pad(n){ return String(n).padStart(2,'0'); }
function localDateStr(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function todayStr(){ return localDateStr(new Date()); }
function fmtTime(iso){ const d=new Date(iso); return `${pad(d.getHours())}:${pad(d.getMinutes())}`; }
function fmtDate(str){
  const [y,m,d]=str.split('-');
  const s=new Date(Number(y),Number(m)-1,Number(d))
    .toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'});
  return s.charAt(0).toUpperCase()+s.slice(1);
}
function durStr(sec){ return `${pad(Math.floor(sec/60))}:${pad(sec%60)}`; }
function totalMin(list){ return Math.round(list.reduce((a,s)=>a+(s.duration||0),0)/60); }

// ── storage ───────────────────────────────────────────────────────
function load(){ try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'); }catch{ return []; } }
function save(s){ localStorage.setItem(STORAGE_KEY,JSON.stringify(s)); }

// ── active session ────────────────────────────────────────────────
let activeSession=null, timerInterval=null;

function elapsedSec(){
  if(!activeSession) return 0;
  return Math.floor((Date.now() - new Date(activeSession.startTime).getTime()) / 1000);
}

function startSession(side){
  if(activeSession) return;

  // Check if last finished session used the same side
  const all=load();
  const lastSame=all.find(s=>s.side===side);
  if(lastSame){
    const minsSince=Math.round((Date.now()-new Date(lastSame.endTime).getTime())/60000);
    if(minsSince < 60){ // only ask if less than 60 min ago
      pendingStart={side, lastSame};
      document.getElementById('merge-text').textContent=
        `La última toma de teta ${side} terminó hace ${minsSince} min (${fmtTime(lastSame.endTime)}). ¿La unimos con esta?`;
      document.getElementById('merge-modal').classList.add('open');
      return;
    }
  }
  doStartSession(side, null);
}

let pendingStart = null;

function mergeAnswer(merge){
  document.getElementById('merge-modal').classList.remove('open');
  if(!pendingStart) return;
  const {side, lastSame} = pendingStart;
  pendingStart = null;
  doStartSession(side, merge ? lastSame : null);
}

function closeMergeOutside(e){
  if(e.target===document.getElementById('merge-modal')){
    document.getElementById('merge-modal').classList.remove('open');
    pendingStart=null;
  }
}

function doStartSession(side, mergeWith){
  if(mergeWith){
    // Remove the previous session and start new one from its startTime
    const all=load();
    const filtered=all.filter(s=>s.id!==mergeWith.id);
    save(filtered);
    activeSession={side, startTime:mergeWith.startTime};
  } else {
    activeSession={side, startTime:new Date().toISOString()};
  }
  localStorage.setItem('lactancia_active', JSON.stringify(activeSession));
  renderActive();
  timerInterval=setInterval(tickTimer, 500);
}

function tickTimer(){
  const el=document.getElementById('timer-display');
  if(el) el.textContent=durStr(elapsedSec());
}

function stopSession(){
  if(!activeSession) return;
  clearInterval(timerInterval);
  const endTime=new Date().toISOString();
  const duration=elapsedSec();
  const s={
    id:Date.now().toString(), side:activeSession.side,
    date:localDateStr(new Date(activeSession.startTime)),
    startTime:activeSession.startTime, endTime, duration
  };
  const all=load(); all.unshift(s); save(all);
  activeSession=null;
  localStorage.removeItem('lactancia_active');
  renderActive(); renderToday();
}

function renderActive(){
  const card=document.getElementById('active-card');
  const startArea=document.getElementById('start-area');
  if(activeSession){
    card.className=activeSession.side==='izquierda'?'left':'right';
    card.id='active-card'; card.style.display='block';
    document.getElementById('active-label').textContent=
      activeSession.side==='izquierda'?'Teta izquierda':'Teta derecha';
    document.getElementById('active-start').textContent='Inicio: '+fmtTime(activeSession.startTime);
    document.getElementById('timer-display').textContent=durStr(elapsedSec());
    startArea.style.display='none';
    clearInterval(timerInterval);
    timerInterval=setInterval(tickTimer, 500);
  } else {
    card.style.display='none'; startArea.style.display='block'; renderHint();
  }
}

function renderHint(){
  const s=load(); const hint=document.getElementById('hint-text');
  if(!s.length){ hint.textContent=''; return; }
  const last10=s.slice(0,10);
  const minIzq=last10.filter(x=>x.side==='izquierda').reduce((a,x)=>a+(x.duration||0),0);
  const minDer=last10.filter(x=>x.side==='derecha').reduce((a,x)=>a+(x.duration||0),0);
  const suggested=minIzq<=minDer?'izquierda':'derecha';
  const sugMin=suggested==='izquierda'?minIzq:minDer;
  const totMin=minIzq+minDer;
  const sugMinR=Math.round(sugMin/60), totMinR=Math.round(totMin/60);
  hint.innerHTML=`<span style="font-size:15px"><strong>Próxima sugerida: ${suggested==='izquierda'?'⬅️ izquierda':'➡️ derecha'}</strong></span><br><span style="font-weight:normal;font-size:13px">(${sugMinR} de ${totMinR} min, ult. 10)</span>`;
}

// ── shared stats ─────────────────────────────────────────────────
function dayStatsLine(list, dateStr){
  if(!list.length) return '';
  const n=list.length;
  const tot=Math.round(list.reduce((a,s)=>a+(s.duration||0),0)/60);
  const avg=tot/n;
  let mph='—';
  if(dateStr){
    const today=todayStr();
    if(dateStr===today){
      const now=new Date();
      const midnight=new Date(now.getFullYear(),now.getMonth(),now.getDate(),0,0,0);
      const h=(now.getTime()-midnight.getTime())/3600000;
      if(h>0) mph=(tot/h).toFixed(1);
    } else {
      // past day: divide by 24
      mph=(tot/24).toFixed(1);
    }
  }
  return `${n} tomas · ${tot} min · ${avg.toFixed(1)} min/toma · ${mph} min/h`;
}

// ── today ─────────────────────────────────────────────────────────
function yesterdayStr(){
  const d=new Date(); d.setDate(d.getDate()-1); return localDateStr(d);
}

function renderToday(){
  const all=load(), today=todayStr(), ayer=yesterdayStr();

  // Ayer
  const ay=all.filter(s=>s.date===ayer);
  const ayerCard=document.getElementById('ayer-card');
  // Global stats
  const allTotMin=all.reduce((a,s)=>a+(s.duration||0),0)/60;
  const globalAvg=all.length?(allTotMin/all.length).toFixed(1):'—';
  document.getElementById('stat-global-avg').textContent=globalAvg;
  const allSortedG=[...all].sort((a,b)=>new Date(a.startTime)-new Date(b.startTime));
  const globalMph=allSortedG.length
    ? (allTotMin/((Date.now()-new Date(allSortedG[0].startTime).getTime())/3600000)).toFixed(1)
    : '—';
  document.getElementById('stat-global-mph').textContent=globalMph;

  const summaryRow=document.getElementById('summary-row');
  if(ay.length){
    summaryRow.style.display='flex';
    const ayTot=totalMin(ay);
    const ayMph=(ayTot/24).toFixed(1);
    document.getElementById('stat-ayer-tomas').textContent=ay.length;
    document.getElementById('stat-ayer-total').textContent=ayTot;
    document.getElementById('stat-ayer-min').textContent=ay.length?(ayTot/ay.length).toFixed(1):0;
    document.getElementById('stat-ayer-mph').textContent=ayMph;
  } else {
    // Show only global avg even when no ayer data
    summaryRow.style.display='flex';
    document.getElementById('ayer-card').style.display='none';
  }

  // Hoy
  const ts=all.filter(s=>s.date===today).sort((a,b)=>new Date(b.startTime)-new Date(a.startTime));

  const list=document.getElementById('today-list');
  list.innerHTML=ts.length?ts.map(sessionHTML).join(''):'<div class="empty">Todavía no hay tomas registradas hoy 🌙</div>';

  // Today stats line
  const line=dayStatsLine(ts, todayStr());
  document.getElementById('today-stats-line').textContent=line;
  renderProxima();
}

function renderProxima(){
  const all=load();
  const banner=document.getElementById('proxima-banner');
  if(!all.length){ banner.style.display='none'; return; }

  // Last toma by end time
  const sorted=[...all].sort((a,b)=>new Date(b.endTime)-new Date(a.endTime));
  const last=sorted[0];
  const lastEnd=new Date(last.endTime).getTime();
  const windowStart=lastEnd - 3*3600000; // 3h before end of last toma

  // Sum minutes taken in that 2h window
  let minsIn2h=0;
  all.forEach(s=>{
    const t0=new Date(s.startTime).getTime();
    const t1=new Date(s.endTime).getTime();
    const overlap=Math.min(t1,lastEnd)-Math.max(t0,windowStart);
    if(overlap>0) minsIn2h+=overlap/60000;
  });

  // Fixed reference: 10 min/h → expected in 3h = 30 min
  const expected=30;

  // time = 3h * minsIn2h / expected, clamped [1h, 3h]
  const ratio=expected>0?minsIn2h/expected:0;
  const waitMs=Math.min(3, Math.max(0, 3*ratio))*3600000;

  const proxima=new Date(lastEnd+waitMs);
  document.getElementById('pb-time').textContent=fmtTime(proxima.toISOString());
  banner.style.display='flex';
}

function sessionHTML(s){
  const cls=s.side==='izquierda'?'left':'right';
  const label=s.side==='izquierda'?'Izq':'Der';
  return `<div class="session-card ${cls}" id="sc-${s.id}">
    <div class="session-dot"></div>
    <div class="session-info">
      <span class="name">${label}</span>
      <span class="times">${fmtTime(s.startTime)}–${fmtTime(s.endTime)}</span>
    </div>
    <div class="session-dur">${durStr(s.duration)}</div>
    <div class="card-actions">
      <button class="btn-icon" onclick="editSession('${s.id}')">✏️</button>
      <button class="btn-icon" onclick="deleteSession('${s.id}')">✕</button>
    </div>
  </div>`;
}

// ── delete / edit ─────────────────────────────────────────────────
function deleteSession(id){
  if(!confirm('¿Eliminar esta toma?')) return;
  save(load().filter(s=>String(s.id)!==String(id)));
  renderToday(); renderHistorial();
}

function editSession(id){
  const s=load().find(s=>String(s.id)===String(id));
  if(!s) return;
  editingId=id;
  document.getElementById('modal-title').textContent='✏️ Editar toma';
  document.getElementById('m-date').value=s.date;
  document.getElementById('m-start').value=fmtTime(s.startTime);
  document.getElementById('m-end').value=fmtTime(s.endTime);
  document.getElementById('m-side').value=s.side;
  document.getElementById('modal').classList.add('open');
}

// ── modal ─────────────────────────────────────────────────────────
function openModal(){
  editingId=null;
  document.getElementById('modal-title').textContent='✏️ Cargar toma';
  document.getElementById('m-date').value=todayStr();
  document.getElementById('m-start').value='';
  document.getElementById('m-end').value='';
  document.getElementById('m-side').value='izquierda';
  document.getElementById('modal').classList.add('open');
}
function closeModal(){ document.getElementById('modal').classList.remove('open'); editingId=null; }
function closeModalOutside(e){ if(e.target===document.getElementById('modal')) closeModal(); }

function saveModal(){
  const date=document.getElementById('m-date').value;
  const start=document.getElementById('m-start').value;
  const end=document.getElementById('m-end').value;
  const side=document.getElementById('m-side').value;
  if(!date||!start||!end){ alert('Completá todos los campos'); return; }
  const startISO=new Date(`${date}T${start}:00`).toISOString();
  const endISO=new Date(`${date}T${end}:00`).toISOString();
  const duration=Math.max(0,Math.round((new Date(endISO)-new Date(startISO))/1000));
  let all=load();
  if(editingId){
    all=all.map(s=>String(s.id)===String(editingId)?{...s,side,date,startTime:startISO,endTime:endISO,duration}:s);
  } else {
    all.unshift({id:Date.now().toString(),side,date,startTime:startISO,endTime:endISO,duration});
  }
  save(all); closeModal(); renderToday(); renderHistorial();
}

// ── historial ─────────────────────────────────────────────────────
function byDateGroups(){
  const all=load();
  const map={};
  all.forEach(s=>{ if(!map[s.date]) map[s.date]=[]; map[s.date].push(s); });
  const days=Object.keys(map).sort((a,b)=>b.localeCompare(a));
  return {map,days};
}

function renderHistorial(){
  renderTable();
  renderChart();
  renderChartFFT();
  renderChart2();
}

// TABLA
function renderTable(){
  const {map,days}=byDateGroups();
  const container=document.getElementById('history-table');
  if(!days.length){ container.innerHTML='<div class="empty">No hay registros todavía</div>'; return; }
  container.innerHTML=days.map(day=>{
    const list=map[day].sort((a,b)=>new Date(b.startTime)-new Date(a.startTime));
    return `<div class="day-group">
      <div class="day-label">${fmtDate(day)} · ${dayStatsLine(list, day)}</div>
      <div class="sessions-list">${list.map(sessionHTML).join('')}</div>
    </div>`;
  }).join('');
}

// GRÁFICO
const chartLayers = { izq: true, der: true, bins: true, avg: true };

function toggleLayer(key){
  chartLayers[key] = document.getElementById('tog-' + key).checked;
  renderChart();
}

function renderChart(){
  const all=load();
  const scrollWrap=document.getElementById('history-chart-scroll');
  const container=document.getElementById('history-chart');
  if(!all.length){ container.innerHTML='<div class="empty">No hay registros todavía</div>'; return; }

  const binSel=document.getElementById('bin-size');
  const bh=binSel?parseInt(binSel.value):2;

  // Total data span → scale so 3 days = screen width
  const sorted=[...all].sort((a,b)=>new Date(a.startTime)-new Date(b.startTime));
  const tStart=new Date(sorted[0].startTime).getTime();
  const tEnd=new Date(sorted[sorted.length-1].endTime).getTime();
  const totalDays=(tEnd-tStart)/86400000;
  const viewW=window.innerWidth-28;
  const pxPerDay=viewW/3;
  const totalW=Math.max(viewW, Math.round(totalDays*pxPerDay));

  container.style.width=totalW+'px';
  container.innerHTML=buildUnifiedChart(all, totalW, null, chartLayers, null, null, bh);

  // Scroll to most recent on first load
  if(scrollWrap && scrollWrap.dataset.init!=='1'){
    setTimeout(()=>{ scrollWrap.scrollLeft=scrollWrap.scrollWidth; },50);
    scrollWrap.dataset.init='1';
  }
}

function buildUnifiedChart(sessions, containerW, containerH, layers, xPadLOverride, yPadTOverride, binH){
  const VW     = containerW || 340;
  const FORCE_H = containerH || null;
  const L = layers || { izq:true, der:true, bins:true, avg:true };
  const YPAD_T = yPadTOverride || 8;
  const YPAD_B = 28;
  const XPAD_L = xPadLOverride || 32;
  const XPAD_R = 6;
  const PLOT_W = VW - XPAD_L - XPAD_R;
  const PLOT_H = FORCE_H ? FORCE_H - 36 : 150;
  const H      = PLOT_H + YPAD_T + YPAD_B;
  const AXIS_Y = YPAD_T + PLOT_H;

  // X axis: absolute epoch time across all sessions
  const sorted = [...sessions].sort((a,b)=>new Date(a.startTime)-new Date(b.startTime));
  const tStart = new Date(sorted[0].startTime).getTime();
  const tEnd   = new Date(sorted[sorted.length-1].endTime).getTime();
  const tSpan  = tEnd - tStart;

  // Y axis: max duration in minutes
  const maxDurMin = Math.max(...sessions.map(s=>s.duration/60), 5);
  const yMax = Math.ceil(maxDurMin/5)*5;

  function toX(iso){
    return XPAD_L + ((new Date(iso).getTime()-tStart)/tSpan)*PLOT_W;
  }
  function toBarH(durSec){
    return Math.max(3,(durSec/60/yMax)*PLOT_H);
  }

  // Day/night background — SVG linearGradient with stops at key hours
  const SKY_STOPS = [
    [0,  [22, 24, 42]],   // midnight
    [4,  [25, 27, 50]],   // late night
    [5,  [45, 50, 80]],   // pre-dawn
    [6,  [85, 100, 135]], // dawn — blue-grey
    [8,  [130, 165, 188]],// morning — muted sky
    [12, [148, 182, 200]],// midday
    [17, [138, 175, 196]],// afternoon
    [19, [110, 120, 148]],// dusk — back to blue-grey
    [21, [48, 46, 72]],   // early night
    [23, [28, 27, 48]],   // night
    [24, [22, 24, 42]],   // midnight again
  ];

  function skyColor(hourFloat) {
    hourFloat = ((hourFloat % 24) + 24) % 24;
    for (let i = 0; i < SKY_STOPS.length - 1; i++) {
      const [h0, c0] = SKY_STOPS[i];
      const [h1, c1] = SKY_STOPS[i+1];
      if (hourFloat >= h0 && hourFloat <= h1) {
        const t = (hourFloat - h0) / (h1 - h0);
        return c0.map((v, j) => Math.round(v + t * (c1[j] - v)));
      }
    }
    return [28, 30, 48];
  }
  function rgbStr(c) { return `rgb(${c[0]},${c[1]},${c[2]})`; }

  // Build SVG linearGradient stops: one per key hour that falls in range,
  // plus the exact start and end
  const tStartH = new Date(tStart).getHours() + new Date(tStart).getMinutes()/60;
  const tEndH   = new Date(tEnd).getHours()   + new Date(tEnd).getMinutes()/60;
  const tSpanH  = (tEnd - tStart) / 3600000; // total hours in range

  // Collect all key hour timestamps within [tStart, tEnd]
  // Walk day by day to handle multi-day ranges
  const gradStops = [];
  function addGradStop(ms) {
    const frac = (ms - tStart) / (tEnd - tStart);
    if (frac < 0 || frac > 1) return;
    const h = new Date(ms).getHours() + new Date(ms).getMinutes()/60;
    const col = skyColor(h);
    gradStops.push({ pct: (frac * 100).toFixed(2), col: rgbStr(col) });
  }

  // Always add start and end
  addGradStop(tStart);
  addGradStop(tEnd);

  // Add each key hour between tStart and tEnd
  // Iterate each calendar day in range
  const dayMs = 24 * 3600000;
  let dayStart = new Date(tStart); dayStart.setHours(0,0,0,0);
  while (dayStart.getTime() <= tEnd) {
    for (const [h] of SKY_STOPS) {
      const ms = dayStart.getTime() + h * 3600000;
      addGradStop(ms);
    }
    dayStart = new Date(dayStart.getTime() + dayMs);
  }

  gradStops.sort((a, b) => parseFloat(a.pct) - parseFloat(b.pct));

  const gradId = 'skyGrad';
  const svgDefs = `<defs><linearGradient id="${gradId}" x1="0" y1="0" x2="1" y2="0">
    ${gradStops.map(s => `<stop offset="${s.pct}%" stop-color="${s.col}"/>`).join('')}
  </linearGradient></defs>`;
  const bgRect = `<rect x="${XPAD_L}" y="${YPAD_T}" width="${PLOT_W}" height="${PLOT_H}" fill="url(#${gradId})"/>`;

  // Y grid — lighter lines to show over dark bg
  let yLines='', yLabels='';
  const yStep=yMax<=10?2:yMax<=20?5:10;
  for(let y=0;y<=yMax;y+=yStep){
    const yPx=YPAD_T+PLOT_H-(y/yMax)*PLOT_H;
    yLines+=`<line x1="${XPAD_L}" y1="${yPx.toFixed(1)}" x2="${(XPAD_L+PLOT_W).toFixed(1)}" y2="${yPx.toFixed(1)}" stroke="${y===0?'rgba(255,255,255,0.4)':'rgba(255,255,255,0.15)'}" stroke-width="${y===0?1.2:0.6}" stroke-dasharray="${y===0?'none':'3,3'}"/>`;
    yLabels+=`<text x="${(XPAD_L-4).toFixed(1)}" y="${(yPx+3.5).toFixed(1)}" text-anchor="end" font-size="8" fill="#a07850" font-family="DM Sans,sans-serif">${y}</text>`;
  }
  const yAxisLabel=`<text x="7" y="${(YPAD_T+PLOT_H/2).toFixed(1)}" text-anchor="middle" font-size="8" fill="#a07850" font-family="DM Sans,sans-serif" transform="rotate(-90,7,${(YPAD_T+PLOT_H/2).toFixed(1)})">min</text>`;

  // Midnight lines
  let midnights='';
  const d0=new Date(tStart); d0.setHours(0,0,0,0); d0.setDate(d0.getDate()+1);
  const dCur=new Date(d0);
  while(dCur.getTime()<tEnd){
    const x=toX(dCur.toISOString());
    if(x>XPAD_L && x<XPAD_L+PLOT_W){
      const dateLabel=`${pad(dCur.getDate())}/${pad(dCur.getMonth()+1)}`;
      midnights+=`<line x1="${x.toFixed(1)}" y1="${YPAD_T}" x2="${x.toFixed(1)}" y2="${AXIS_Y}" stroke="rgba(255,255,255,0.35)" stroke-width="1" stroke-dasharray="4,3"/>
      <text x="${(x+2).toFixed(1)}" y="${(YPAD_T+8).toFixed(1)}" font-size="7.5" fill="rgba(255,255,255,0.7)" font-family="DM Sans,sans-serif">${dateLabel}</text>`;
    }
    dCur.setDate(dCur.getDate()+1);
  }

  // X axis ticks: mark 6, 12, 18, 0 of every day in range (tick + label, no vertical line)
  let xTicks='';
  const KEY_HOURS = [0, 6, 12, 18];
  const d0t = new Date(tStart); d0t.setHours(0,0,0,0);
  const iterD = new Date(d0t);
  while(iterD.getTime() <= tEnd + 86400000) {
    for(const h of KEY_HOURS) {
      const ms = iterD.getTime() + h * 3600000;
      if(ms < tStart || ms > tEnd) { continue; }
      const x = toX(new Date(ms).toISOString());
      if(x < XPAD_L || x > XPAD_L + PLOT_W) continue;
      // h===0 gets midnight line (already in midnights), just add tick+label
      xTicks += `<line x1="${x.toFixed(1)}" y1="${AXIS_Y}" x2="${x.toFixed(1)}" y2="${(AXIS_Y+4).toFixed(1)}" stroke="#c8b090" stroke-width="1"/>
      <text x="${x.toFixed(1)}" y="${(AXIS_Y+13).toFixed(1)}" text-anchor="middle" font-size="8" fill="#a07850" font-family="DM Sans,sans-serif">${pad(h)}:00</text>`;
    }
    iterD.setDate(iterD.getDate()+1);
  }

  // Compute dot positions
  const R = 5;
  const pts = sorted.map(s=>{
    const midT=new Date((new Date(s.startTime).getTime()+new Date(s.endTime).getTime())/2).toISOString();
    return { cx: toX(midT), cy: YPAD_T+PLOT_H-toBarH(s.duration), side: s.side, dur: s.duration };
  });

  // 1h bins always
  const HRS = 3600000;
  const rawBins = {};
  sorted.forEach(s => {
    const t0 = new Date(s.startTime).getTime();
    const t1 = new Date(s.endTime).getTime();
    if(t1 <= t0) return;
    const h0 = Math.floor(t0 / HRS);
    const h1 = Math.floor((t1 - 1) / HRS);
    for(let h = h0; h <= h1; h++){
      const overlap = Math.min(t1,(h+1)*HRS) - Math.max(t0,h*HRS);
      rawBins[h] = (rawBins[h] || 0) + overlap / 60000;
    }
  });

  const firstB = Math.floor(tStart / HRS);
  const lastB  = Math.floor((tEnd - 1) / HRS);

  // Gaussian kernel smoothing (sigma=0 means no smoothing)
  const sigma = (binH !== null && binH !== undefined) ? binH : 2;
  const smoothed = {};
  if(sigma === 0){
    for(let b = firstB; b <= lastB; b++) smoothed[b] = rawBins[b] || 0;
  } else {
    const kRadius = Math.ceil(sigma * 3);
    for(let b = firstB; b <= lastB; b++){
      let sum = 0, wSum = 0;
      for(let k = -kRadius; k <= kRadius; k++){
        const nb = b + k;
        if(nb < firstB || nb > lastB) continue; // only sum over existing bins
        const w = Math.exp(-(k*k) / (2*sigma*sigma));
        sum  += (rawBins[nb] || 0) * w;
        wSum += w;
      }
      smoothed[b] = wSum > 0 ? sum / wSum : 0;
    }
  }

  const maxBin = Math.max(...Object.values(rawBins), 1); // fixed to raw so suavizado shows amplitude decay

  const binPts = [];
  for(let b = firstB; b <= lastB; b++){
    const midMs = b * HRS + HRS / 2;
    const bx = Math.max(XPAD_L, Math.min(XPAD_L + PLOT_W, toX(new Date(midMs).toISOString())));
    const val = smoothed[b] || 0;
    const by = YPAD_T + PLOT_H - (val / maxBin) * PLOT_H * 0.85;
    binPts.push({ x: bx, y: by });
  }

  // Step-filled path (like matplotlib steps): no gaps between bins
  const hourW = PLOT_W / Math.max(1, lastB - firstB + 1); // 1h bins
  let spline = '';
  if(L.bins && binPts.length >= 1){
    // Each bin occupies [p.x - hourW/2, p.x + hourW/2]
    let d = '';
    binPts.forEach((p, i) => {
      const x0 = (p.x - hourW/2).toFixed(1);
      const x1 = (p.x + hourW/2).toFixed(1);
      const y  = p.y.toFixed(1);
      if(i === 0) d += `M${x0},${AXIS_Y} L${x0},${y} L${x1},${y} `;
      else        d += `L${x0},${y} L${x1},${y} `;
    });
    // Close back to baseline
    const lastX = (binPts[binPts.length-1].x + hourW/2).toFixed(1);
    d += `L${lastX},${AXIS_Y} Z`;
    spline = `<path d="${d}" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.55)" stroke-width="1.2" stroke-linejoin="miter"/>`;
  }

  // Dots — radius proportional to duration (r=5 at 20min)
  const bars = pts.map(p=>{
    const r = Math.max(2, (p.dur/60/20)*5);
    if(p.side==='izquierda' && !L.izq) return '';
    if(p.side==='derecha' && !L.der) return '';
    const fill=p.side==='izquierda'?'#ffd84d':'#4de8a8';
    const stroke=p.side==='izquierda'?'#c8960a':'#1ab87a';
    return `<circle cx="${p.cx.toFixed(1)}" cy="${p.cy.toFixed(1)}" r="${r.toFixed(1)}" fill="${fill}" stroke="${stroke}" stroke-width="1.2"/>`;
  }).join('');

  const baseline=`<line x1="${XPAD_L}" y1="${AXIS_Y}" x2="${(XPAD_L+PLOT_W).toFixed(1)}" y2="${AXIS_Y}" stroke="rgba(255,255,255,0.5)" stroke-width="1.2"/>`;

  // Average duration line
  const izqSessions=sessions.filter(s=>s.side==='izquierda');
  const derSessions=sessions.filter(s=>s.side==='derecha');
  function sideAvgLine(list, color, label){
    if(!list.length) return '';
    const avg=list.reduce((a,s)=>a+s.duration,0)/60/list.length;
    const y=(YPAD_T+PLOT_H-(avg/yMax)*PLOT_H).toFixed(1);
    return `<line x1="${XPAD_L}" y1="${y}" x2="${(XPAD_L+PLOT_W).toFixed(1)}" y2="${y}" stroke="${color}" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="${(XPAD_L+PLOT_W+2).toFixed(1)}" y="${(Number(y)+3).toFixed(1)}" font-size="7.5" fill="${color}" font-family="DM Sans,sans-serif">${label}${Math.round(avg)}m</text>`;
  }
  const avgLine=L.avg?(sideAvgLine(izqSessions,'#ffd84d','i:')+sideAvgLine(derSessions,'#4de8a8','d:')):'';

  return `<svg class="chart" width="${VW}" height="${H}" viewBox="0 0 ${VW} ${H}" style="display:block;border-radius:8px">
    ${svgDefs}${bgRect}${yLines}${yLabels}${yAxisLabel}${midnights}${avgLine}${spline}${bars}${baseline}${xTicks}
  </svg>`;
}

function buildFFTChart(sessions, containerW, containerH){
  const VW=containerW||340;
  const FORCE_H=containerH||null;
  const YPAD_T=FORCE_H?28:8;
  const YPAD_B=28;
  const XPAD_L=FORCE_H?48:32;
  const XPAD_R=14;
  const PLOT_W=VW-XPAD_L-XPAD_R;
  const PLOT_H=FORCE_H?FORCE_H-36:130;
  const H=PLOT_H+YPAD_T+YPAD_B;
  const AXIS_Y=YPAD_T+PLOT_H;

  // Build per-day bins for complete days (24 valid bins)
  const perDayBins={};
  sessions.forEach(s=>{
    const date=s.date;
    if(!perDayBins[date]) perDayBins[date]={};
    const t0=new Date(s.startTime).getTime();
    const t1=new Date(s.endTime).getTime();
    for(let h=0;h<24;h++){
      const ss=new Date(s.startTime); ss.setHours(h,0,0,0);
      const se=new Date(ss.getTime()+3600000);
      const ss_ms=ss.getTime(), se_ms=se.getTime();
      const overlap=(Math.min(t1,se_ms)-Math.max(t0,ss_ms))/60000;
      if(overlap>0) perDayBins[date][h]=(perDayBins[date][h]||0)+overlap;
    }
  });

  const allSorted=[...sessions].sort((a,b)=>new Date(a.startTime)-new Date(b.startTime));
  const firstMs=new Date(allSorted[0].startTime).getTime();
  const lastMs=new Date(allSorted[allSorted.length-1].endTime).getTime();

  // Find complete days (all 24 bins valid)
  const completeDays=Object.keys(perDayBins).sort().filter(date=>{
    const [y,m,d]=date.split('-').map(Number);
    let valid=0;
    for(let h=0;h<24;h++){
      const ss=new Date(y,m-1,d,h,0,0).getTime();
      const se=ss+3600000;
      if(se>firstMs && ss<lastMs) valid++;
    }
    return valid===24;
  });

  if(completeDays.length<1) return '<div class="empty" style="color:#a07850;padding:16px;text-align:center">No hay días completos para FFT</div>';

  // Build signal
  const signal=[];
  completeDays.forEach(date=>{
    for(let h=0;h<24;h++) signal.push(perDayBins[date][h]||0);
  });

  // FFT (real, via Cooley-Tukey approximation in JS)
  const N=signal.length;
  // DFT brute force (N<=72, fast enough)
  const amps=[];
  const periods=[];
  for(let k=1;k<=Math.floor(N/2);k++){
    let re=0,im=0;
    for(let n=0;n<N;n++){
      const angle=2*Math.PI*k*n/N;
      re+=signal[n]*Math.cos(angle);
      im-=signal[n]*Math.sin(angle);
    }
    const amp=Math.sqrt(re*re+im*im)/N*2;
    const period=N/k; // in hours (since d=1h)
    if(period<=24){ amps.push(amp); periods.push(period); }
  }

  const maxAmp=Math.max(...amps,1);
  const BAR_W=Math.max(2,(PLOT_W/periods.length)*0.8);

  function toX(p){ return XPAD_L+(p/24)*PLOT_W; }
  function toY(a){ return YPAD_T+PLOT_H-(a/maxAmp)*PLOT_H; }

  // Bars
  let bars='';
  amps.forEach((a,i)=>{
    const x=toX(periods[i])-BAR_W/2;
    const bh=(a/maxAmp)*PLOT_H;
    const by=YPAD_T+PLOT_H-bh;
    bars+=`<rect x="${x.toFixed(1)}" y="${by.toFixed(1)}" width="${BAR_W.toFixed(1)}" height="${bh.toFixed(1)}" rx="1" fill="#4de8a8" fill-opacity="0.7" stroke="#1ab87a" stroke-width="0.8"/>`;
  });

  // Top 3 labels
  const topIdx=[...amps.keys()].sort((a,b)=>amps[b]-amps[a]).slice(0,3);
  let labels='';
  topIdx.forEach(i=>{
    const x=toX(periods[i]);
    const y=toY(amps[i])-4;
    labels+=`<text x="${x.toFixed(1)}" y="${y.toFixed(1)}" text-anchor="middle" font-size="8" fill="#ffd84d" font-family="DM Sans,sans-serif" font-weight="bold">${periods[i].toFixed(1)}h</text>`;
  });

  // Y grid
  let yLines='',yLabels='';
  const yStep=maxAmp<=5?1:maxAmp<=10?2:5;
  for(let y=0;y<=maxAmp;y+=yStep){
    const yPx=YPAD_T+PLOT_H-(y/maxAmp)*PLOT_H;
    if(yPx<YPAD_T) break;
    yLines+=`<line x1="${XPAD_L}" y1="${yPx.toFixed(1)}" x2="${(XPAD_L+PLOT_W).toFixed(1)}" y2="${yPx.toFixed(1)}" stroke="${y===0?'rgba(255,255,255,0.4)':'rgba(255,255,255,0.12)'}" stroke-width="${y===0?1.2:0.6}" stroke-dasharray="${y===0?'none':'3,3'}"/>`;
    yLabels+=`<text x="${(XPAD_L-4).toFixed(1)}" y="${(yPx+3.5).toFixed(1)}" text-anchor="end" font-size="8" fill="#a07850" font-family="DM Sans,sans-serif">${y.toFixed(1)}</text>`;
  }
  const yAxisLabel=`<text x="7" y="${(YPAD_T+PLOT_H/2).toFixed(1)}" text-anchor="middle" font-size="8" fill="#a07850" font-family="DM Sans,sans-serif" transform="rotate(-90,7,${(YPAD_T+PLOT_H/2).toFixed(1)})">amp</text>`;

  // X ticks at 1,2,3,4,6,8,12,24
  let xTicks='';
  [2,4,6,8,12,24].forEach(p=>{
    const x=toX(p);
    if(x<XPAD_L||x>XPAD_L+PLOT_W) return;
    xTicks+=`<line x1="${x.toFixed(1)}" y1="${AXIS_Y}" x2="${x.toFixed(1)}" y2="${(AXIS_Y+4).toFixed(1)}" stroke="#c8b090" stroke-width="1"/>
    <text x="${x.toFixed(1)}" y="${(AXIS_Y+13).toFixed(1)}" text-anchor="middle" font-size="8" fill="#a07850" font-family="DM Sans,sans-serif">${p}h</text>`;
  });

  const baseline=`<line x1="${XPAD_L}" y1="${AXIS_Y}" x2="${(XPAD_L+PLOT_W).toFixed(1)}" y2="${AXIS_Y}" stroke="rgba(255,255,255,0.4)" stroke-width="1.2"/>`;
  const bgRect=`<rect x="${XPAD_L}" y="${YPAD_T}" width="${PLOT_W}" height="${PLOT_H}" fill="#16182a" rx="4"/>`;

  return `<svg width="100%" viewBox="0 0 ${VW} ${H}" style="display:block;border-radius:8px">
    ${bgRect}${yLines}${yLabels}${yAxisLabel}${bars}${labels}${baseline}${xTicks}
  </svg>`;
}

function buildStackedChart(sessions, containerW, containerH){
  const VW     = containerW || 340;
  const FORCE_H = containerH || null;
  const YPAD_T = containerH ? 28 : 8;
  const YPAD_B = 28;
  const XPAD_L = containerH ? 48 : 32;
  const XPAD_R = 14;
  const PLOT_W = VW - XPAD_L - XPAD_R;
  const PLOT_H = FORCE_H ? FORCE_H - 36 : 150;
  const H      = PLOT_H + YPAD_T + YPAD_B;
  const AXIS_Y = YPAD_T + PLOT_H;

  // X axis spans exactly 0–24h
  const DAY_MS = 24 * 3600000;
  function toX(hourFloat){
    return XPAD_L + (hourFloat / 24) * PLOT_W;
  }

  // Build per-day, per-hour bins
  // For each session, find which hour slots it covers and accumulate
  const perDayBins = {}; // date -> { hour: minutes }
  sessions.forEach(s => {
    const t0 = new Date(s.startTime);
    const t1 = new Date(s.endTime);
    const date = s.date;
    if(!perDayBins[date]) perDayBins[date] = {};
    // Walk hour slots
    const h0 = t0.getHours();
    const h1 = t1.getHours();
    const ms0 = t0.getTime();
    const ms1 = t1.getTime();
    for(let h = h0; h <= h1; h++){
      const slotStart = new Date(t0); slotStart.setHours(h,0,0,0);
      const slotEnd   = new Date(t0); slotEnd.setHours(h+1 > 23 ? 23 : h+1, h+1>23?59:0, h+1>23?59:0, h+1>23?999:0);
      // Handle h==23 specially
      const slotEndMs = h < 23
        ? new Date(t0.getFullYear(), t0.getMonth(), t0.getDate(), h+1, 0, 0).getTime()
        : new Date(t0.getFullYear(), t0.getMonth(), t0.getDate(), 23, 59, 59, 999).getTime();
      const slotStartMs = new Date(t0.getFullYear(), t0.getMonth(), t0.getDate(), h, 0, 0).getTime();
      const overlap = (Math.min(ms1, slotEndMs) - Math.max(ms0, slotStartMs)) / 60000;
      if(overlap > 0) perDayBins[date][h] = (perDayBins[date][h] || 0) + overlap;
    }
  });

  const days = Object.keys(perDayBins).sort();
  const nDays = days.length;
  if(!nDays) return '<div class="empty">No hay datos</div>';

  // First and last timestamps to know valid range per day
  const allSorted = [...sessions].sort((a,b)=>new Date(a.startTime)-new Date(b.startTime));
  const firstMs = new Date(allSorted[0].startTime).getTime();
  const lastMs  = new Date(allSorted[allSorted.length-1].endTime).getTime();

  // For each hour 0-23, compute average over days where that hour "existed"
  const avgBins = {}; // hour -> avg minutes
  for(let h = 0; h < 24; h++){
    let sum = 0, count = 0;
    days.forEach(date => {
      // Does hour h exist for this day?
      // Hour h of this day: [date h:00, date h+1:00)
      const [y,m,d] = date.split('-').map(Number);
      const slotStartMs = new Date(y, m-1, d, h, 0, 0).getTime();
      const slotEndMs   = new Date(y, m-1, d, h+1 > 23 ? 23 : h+1, 0, 0).getTime();
      // Slot must have started (slotStart <= lastMs) and be after firstMs
      if(slotStartMs > lastMs) return;     // future slot
      if(slotEndMs <= firstMs) return;     // before we started recording
      // This slot "exists" for this day
      sum += perDayBins[date][h] || 0;
      count++;
    });
    if(count > 0) avgBins[h] = sum / count;
  }

  const maxBin = Math.max(...Object.values(avgBins), 1);

  // Build step path
  const hourW = PLOT_W / 24;
  let stepD = '';
  let started = false;
  for(let h = 0; h < 24; h++){
    if(avgBins[h] === undefined) continue;
    const x0 = (XPAD_L + h * hourW).toFixed(1);
    const x1 = (XPAD_L + (h+1) * hourW).toFixed(1);
    const y  = (YPAD_T + PLOT_H - (avgBins[h] / maxBin) * PLOT_H * 0.85).toFixed(1);
    if(!started){ stepD += `M${x0},${AXIS_Y} L${x0},${y} L${x1},${y} `; started=true; }
    else         { stepD += `L${x0},${y} L${x1},${y} `; }
  }
  // Close
  const lastValidH = [...Array(24).keys()].reverse().find(h => avgBins[h] !== undefined);
  if(lastValidH !== undefined){
    stepD += `L${(XPAD_L + (lastValidH+1) * hourW).toFixed(1)},${AXIS_Y} Z`;
  }
  const stepPath = stepD
    ? `<path d="${stepD}" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.55)" stroke-width="1.2" stroke-linejoin="miter"/>`
    : '';

  // Y grid
  const yStep = maxBin<=5?1:maxBin<=10?2:maxBin<=20?5:10;
  let yLines='', yLabels='';
  for(let y=0; y<=Math.ceil(maxBin); y+=yStep){
    const yPx = YPAD_T + PLOT_H - (y/maxBin)*PLOT_H*0.85;
    if(yPx < YPAD_T) break;
    yLines  += `<line x1="${XPAD_L}" y1="${yPx.toFixed(1)}" x2="${(XPAD_L+PLOT_W).toFixed(1)}" y2="${yPx.toFixed(1)}" stroke="${y===0?'rgba(255,255,255,0.4)':'rgba(255,255,255,0.12)'}" stroke-width="${y===0?1.2:0.6}" stroke-dasharray="${y===0?'none':'3,3'}"/>`;
    yLabels += `<text x="${(XPAD_L-4).toFixed(1)}" y="${(yPx+3.5).toFixed(1)}" text-anchor="end" font-size="8" fill="#a07850" font-family="DM Sans,sans-serif">${Math.round(y)}</text>`;
  }
  const yAxisLabel=`<text x="7" y="${(YPAD_T+PLOT_H/2).toFixed(1)}" text-anchor="middle" font-size="8" fill="#a07850" font-family="DM Sans,sans-serif" transform="rotate(-90,7,${(YPAD_T+PLOT_H/2).toFixed(1)})">min</text>`;

  // X ticks at 0,6,12,18,24
  let xTicks='';
  [0,6,12,18,24].forEach(h => {
    const x = (XPAD_L + (h/24)*PLOT_W).toFixed(1);
    xTicks += `<line x1="${x}" y1="${AXIS_Y}" x2="${x}" y2="${(AXIS_Y+4).toFixed(1)}" stroke="#c8b090" stroke-width="1"/>
    <text x="${x}" y="${(AXIS_Y+13).toFixed(1)}" text-anchor="middle" font-size="8" fill="#a07850" font-family="DM Sans,sans-serif">${pad(h)}:00</text>`;
  });

  // Global avg line: total minutes / total hours elapsed
  const totalMins = sessions.reduce((a,s)=>a+(s.duration||0),0)/60;
  const totalHours = (lastMs - firstMs) / 3600000;
  const globalAvgPerHour = totalHours > 0 ? totalMins / totalHours : 0;
  const avgYpx = (YPAD_T + PLOT_H - (globalAvgPerHour / maxBin) * PLOT_H * 0.85).toFixed(1);
  const avgLine = avgYpx >= YPAD_T && avgYpx <= AXIS_Y
    ? `<line x1="${XPAD_L}" y1="${avgYpx}" x2="${(XPAD_L+PLOT_W).toFixed(1)}" y2="${avgYpx}" stroke="rgba(255,255,255,0.7)" stroke-width="1" stroke-dasharray="4,3"/>
       <text x="${(XPAD_L+PLOT_W+2).toFixed(1)}" y="${(Number(avgYpx)+3).toFixed(1)}" font-size="7.5" fill="rgba(255,255,255,0.8)" font-family="DM Sans,sans-serif">x̄${globalAvgPerHour.toFixed(1)}m</text>`
    : '';

  // Background gradient 0-24h
  const SKY_STOPS2 = [[0,[22,24,42]],[4,[25,27,50]],[5,[45,50,80]],[6,[85,100,135]],[8,[130,165,188]],[12,[148,182,200]],[17,[138,175,196]],[19,[110,120,148]],[21,[48,46,72]],[23,[28,27,48]],[24,[22,24,42]]];
  function skyColor2(h){
    for(let i=0;i<SKY_STOPS2.length-1;i++){
      const [h0,c0]=SKY_STOPS2[i],[h1,c1]=SKY_STOPS2[i+1];
      if(h>=h0&&h<=h1){const t=(h-h0)/(h1-h0);return c0.map((v,j)=>Math.round(v+t*(c1[j]-v)));}
    }
    return [22,24,42];
  }
  const gradId2='skyGrad2';
  const gradStops2=[];
  SKY_STOPS2.forEach(([h])=>{
    const frac=h/24;
    const c=skyColor2(h);
    gradStops2.push(`<stop offset="${(frac*100).toFixed(1)}%" stop-color="rgb(${c[0]},${c[1]},${c[2]})"/>`);
  });
  const svgDefs2=`<defs><linearGradient id="${gradId2}" x1="0" y1="0" x2="1" y2="0">${gradStops2.join('')}</linearGradient></defs>`;
  const bgRect2=`<rect x="${XPAD_L}" y="${YPAD_T}" width="${PLOT_W}" height="${PLOT_H}" fill="url(#${gradId2})"/>`;
  const baseline=`<line x1="${XPAD_L}" y1="${AXIS_Y}" x2="${(XPAD_L+PLOT_W).toFixed(1)}" y2="${AXIS_Y}" stroke="rgba(255,255,255,0.5)" stroke-width="1.2"/>`;

  return `<svg width="100%" viewBox="0 0 ${VW} ${H}" style="display:block;border-radius:8px">
    ${svgDefs2}${bgRect2}${yLines}${yLabels}${yAxisLabel}${stepPath}${avgLine}${baseline}${xTicks}
  </svg>`;
}

// ── swipe carousel ───────────────────────────────────────────────
let curIdx = 0;
(function(){
  const el  = document.getElementById('main-content');
  const track = document.getElementById('carousel-track');
  let x0 = null, dragging = false, startTx = 0;

  function getTx(){ return -curIdx * 100; } // in %

  let y0 = null, locked = null; // locked: 'h' horizontal, 'v' vertical

  el.addEventListener('touchstart', e => {
    // If touch starts inside a horizontally scrollable element, don't hijack
    let node = e.target;
    while(node && node !== el){
      const st = window.getComputedStyle(node);
      if((st.overflowX === 'auto' || st.overflowX === 'scroll') && node.scrollWidth > node.clientWidth){
        x0 = null; return; // let the inner scroll handle it
      }
      node = node.parentElement;
    }
    x0 = e.touches[0].clientX;
    y0 = e.touches[0].clientY;
    startTx = getTx();
    locked = null;
    dragging = true;
    track.style.transition = 'none';
  }, {passive:true});

  el.addEventListener('touchmove', e => {
    if(!dragging || x0 === null) return;
    const dx = e.touches[0].clientX - x0;
    const dy = e.touches[0].clientY - y0;
    // Determine lock direction on first significant move
    if(!locked && (Math.abs(dx) > 8 || Math.abs(dy) > 8)){
      locked = Math.abs(dx) > Math.abs(dy) ? 'h' : 'v';
    }
    if(locked !== 'h') return; // vertical scroll wins
    e.preventDefault();
    const W = el.offsetWidth || window.innerWidth;
    const rawPct = startTx + (dx / W * 100);
    const min = -(VIEWS.length-1)*100, max = 0;
    let pct;
    if(rawPct > max){
      // rubber band past start
      pct = max + (rawPct - max) * 0.18;
    } else if(rawPct < min){
      // rubber band past end
      pct = min + (rawPct - min) * 0.18;
    } else {
      pct = rawPct;
    }
    track.style.transform = `translateX(${pct}%)`;
  }, {passive:false});

  el.addEventListener('touchend', e => {
    if(!dragging) return;
    dragging = false;
    if(locked === 'h'){
      const dx = e.changedTouches[0].clientX - x0;
      if(dx < -60 && curIdx < VIEWS.length-1) curIdx++;
      else if(dx > 60 && curIdx > 0) curIdx--;
    }
    x0 = null; y0 = null; locked = null;
    // Springy snap back
    track.style.transition = 'transform 0.38s cubic-bezier(.175,.885,.32,1.15)';
    requestAnimationFrame(() => {
      showView(VIEWS[curIdx]);
    });
  }, {passive:true});
})();

// ── init ──────────────────────────────────────────────────────────
// Restore in-progress session if app was closed mid-toma
(function(){
  try {
    const saved = localStorage.getItem('lactancia_active');
    if(saved) activeSession = JSON.parse(saved);
  } catch(e){}
})();
renderActive();
renderToday();
</script>
